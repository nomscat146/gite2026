<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planning ménage — Gîte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f1;--surface:#ffffff;--surface2:#edecea;--border:#e2dfdb;--border2:#c8c4be;
  --text:#1a1917;--text2:#7a746d;--text3:#b4afa8;
  --green:#3d6648;--green-bg:#f2f8f4;--green-border:#bdd1c5;
  --blue:#3a5f8c;--blue-bg:#f2f6fb;--blue-border:#bacfe6;
  --red:#884040;--red-bg:#fbf4f4;--red-border:#ddbdbd;
  --amber:#75602c;--amber-bg:#faf7ee;--amber-border:#d9c99a;
  --purple:#5c4e8a;--purple-bg:#f5f3fb;--purple-border:#c5b8e3;
  --accent:#74482a;--radius:9px;--radius-sm:5px;
  --shadow:0 1px 3px rgba(0,0,0,.05);
  --t:.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.55}
.wrap{max-width:660px;margin:0 auto;padding:1.75rem 1.25rem 5rem}

/* LOGIN */
.login-screen{max-width:320px;margin:5rem auto;text-align:center}
.login-logo{width:40px;height:40px;background:var(--text);border-radius:10px;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;opacity:.88}
.login-logo svg,.topbar-icon svg{color:#fff}
.login-title{font-family:'DM Serif Display',serif;font-size:1.75rem;font-weight:400;margin-bottom:.375rem;letter-spacing:.01em}
.login-sub{font-size:.875rem;color:var(--text3);margin-bottom:2.25rem}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem 1rem 1.5rem;cursor:pointer;transition:border-color var(--t),box-shadow var(--t);text-align:center}
.profile-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.p-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 11px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;font-family:'DM Mono',monospace}
.av-o{background:#f3ede0;color:#75602c}.av-c{background:#e4f0e7;color:#3d6648}
.p-name{font-size:.9375rem;font-weight:600;letter-spacing:-.01em}.p-role{font-size:.75rem;color:var(--text3);margin-top:3px}

/* PASSWORD */
.pwd-screen{max-width:280px;margin:5rem auto}
.pwd-back{font-size:.8125rem;color:var(--text3);margin-bottom:1.75rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:color var(--t)}
.pwd-back:hover{color:var(--text2)}
.pwd-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.75rem}
.pwd-title{font-family:'DM Serif Display',serif;font-size:1.375rem;font-weight:400;margin-bottom:.25rem;letter-spacing:.01em}
.pwd-sub{font-size:.8125rem;color:var(--text3);margin-bottom:1.375rem}
.pwd-input{width:100%;padding:10px 12px;font-size:.9375rem;font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);text-align:center;letter-spacing:.2em;margin-bottom:10px;transition:border-color var(--t)}
.pwd-input:focus{outline:none;border-color:var(--border2)}
.pwd-btn{width:100%;padding:9px;font-size:.875rem;font-weight:500;font-family:'Inter',sans-serif;border:1px solid var(--green-border);border-radius:var(--radius-sm);background:var(--green-bg);color:var(--green);cursor:pointer;transition:background var(--t)}
.pwd-btn:hover{background:#dceee2}
.pwd-err{font-size:.8125rem;color:var(--red);margin-top:8px;display:none;text-align:center}
.pwd-err.show{display:block}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding-bottom:1.125rem;border-bottom:1px solid var(--border)}
.topbar-icon{width:28px;height:28px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.85}
.topbar-title{font-family:'DM Serif Display',serif;font-size:1.25rem;font-weight:400;flex:1;letter-spacing:.01em}
.switch-btn{font-size:.75rem;padding:4px 11px;border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;transition:background var(--t),color var(--t),border-color var(--t)}
.switch-btn:hover{background:var(--surface2);color:var(--text2);border-color:var(--border2)}

/* ICAL BAR */
.ical-bar{display:flex;align-items:center;gap:9px;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 13px}
.ical-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ical-dot-ok{background:#5a9e6f}
.ical-dot-wait{background:#c4954a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ical-lbl{font-size:.6875rem;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'DM Mono',monospace}
.ical-status{font-size:.6875rem;font-weight:600;white-space:nowrap}
.ical-ok{color:var(--green)}.ical-loading{color:var(--amber)}.ical-demo{color:var(--text3)}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.75rem}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.125rem}
.stat-label{font-size:.625rem;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.stat-value{font-size:1.625rem;font-weight:600;letter-spacing:-.04em;color:var(--text)}
.stat-value.alert{color:var(--accent)}

/* ALERT BANNER */
.alert-banner{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius);padding:11px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.alert-banner-text{flex:1;font-size:.8125rem;color:var(--red);font-weight:500}

/* SECTION */
.sec-div{font-size:.625rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:2rem 0 .875rem;display:flex;align-items:center;gap:8px}
.sec-div::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-count{background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:8px;font-size:.5625rem;font-weight:600}
.empty{color:var(--text3);font-size:.875rem;padding:.625rem 0;font-style:normal}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.125rem 1.25rem;margin-bottom:7px;transition:border-color var(--t)}
.card.has-alert{border-color:var(--red-border)}
.card-top{display:flex;align-items:flex-start;gap:11px}
.card-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:7px}
.d-none{background:var(--border2)}.d-me{background:#5a9e6f}.d-cp{background:#5a7faa}.d-ok{background:#5a9e6f}.d-ko{background:#b56060}
.card-info{flex:1;min-width:0}
.card-title{font-family:'DM Serif Display',serif;font-size:1.125rem;font-weight:400;letter-spacing:.01em;line-height:1.35}
.card-sub{font-size:.8125rem;color:var(--text3);margin-top:2px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;max-width:145px}

/* BADGES */
.badge{font-size:.5625rem;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;display:inline-block;letter-spacing:.04em;text-transform:uppercase}
.b-none{background:#f3ede0;color:#75602c}
.b-me{background:#e4f0e7;color:#2e5239}
.b-cp{background:#e3ecf7;color:#2a4a73}
.b-ok{background:#e4f0e7;color:#2e5239}
.b-ko{background:#f5e8e8;color:#6b2e2e}
.b-modified{background:#f3ede0;color:#75602c}

/* BUTTONS */
.card-actions{display:flex;gap:6px;margin-top:1rem;flex-wrap:wrap}
.btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.8125rem;font-weight:500;color:var(--text2);font-family:'Inter',sans-serif;transition:background var(--t),color var(--t),border-color var(--t);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}.btn-green:hover{background:#d6ead9}
.btn-blue{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}.btn-blue:hover{background:#d6e6f5}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}.btn-red:hover{background:#f0d8d8}
.btn-amber{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}.btn-amber:hover{background:#ece3cc}
.btn-purple{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}.btn-purple:hover{background:#e4dcf5}
.toggle-detail{font-size:.75rem;color:var(--text3);background:none;border:none;cursor:pointer;padding:3px 0;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;transition:color var(--t)}
.toggle-detail:hover{color:var(--text2)}

/* TASK PANEL */
.tpanel{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.tpanel.open{display:block}
.tg{margin-bottom:1.125rem}.tg:last-child{margin-bottom:0}
.tg-label{font-size:.5625rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.t-fixed{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:.8125rem;color:var(--text3);background:var(--bg);border-radius:var(--radius-sm);margin-bottom:2px}
.lock-icon{font-size:.625rem;opacity:.35}
.t-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);margin-bottom:2px;transition:background var(--t),border-color var(--t)}
.t-item.chk{background:var(--green-bg);border-color:var(--green-border)}
.t-item input[type=checkbox]{cursor:pointer;flex-shrink:0;accent-color:var(--green)}
.t-label{font-size:.8125rem;line-height:1.4;color:var(--text2)}
.t-item.chk .t-label{color:var(--green)}
.r-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);margin-bottom:2px;transition:background var(--t),border-color var(--t)}
.r-item.sel{background:var(--blue-bg);border-color:var(--blue-border)}
.r-item.sel .t-label{color:var(--blue)}
.r-item input{cursor:pointer;flex-shrink:0;accent-color:var(--blue)}
.field-note{width:100%;padding:9px 11px;font-size:.8125rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;resize:vertical;min-height:60px;margin-top:.875rem;transition:border-color var(--t)}
.field-note:focus{outline:none;border-color:var(--border2)}
.field-note::placeholder{color:var(--text3)}

/* DATE EDIT */
.date-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.875rem;margin-bottom:1.125rem}
.date-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;flex-wrap:wrap}
.date-edit-label{font-size:.75rem;color:var(--text2);font-weight:500;min-width:110px}
.date-edit-input{padding:6px 9px;font-size:.8125rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;transition:border-color var(--t);width:160px}
.date-edit-input:focus{outline:none;border-color:var(--border2)}
.date-hint{font-size:.6875rem;color:var(--text3);margin-top:.375rem}
.date-actions{display:flex;gap:7px;margin-top:.75rem}

/* SMS */
.sms-box{margin-top:1rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.sms-header{font-size:.625rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.625rem}
.sms-body{font-size:.75rem;line-height:1.8;white-space:pre-wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Mono',monospace;color:var(--text2)}
.sms-footer{margin-top:.75rem;display:flex;align-items:center;gap:8px}
.copy-hint{font-size:.75rem;color:var(--text3);flex:1}

/* COMMENTS */
.comment-box{margin-top:.875rem;padding:9px 12px;background:var(--blue-bg);border-radius:var(--radius-sm);border-left:2px solid var(--blue-border)}
.comment-author{font-size:.5625rem;font-weight:600;color:var(--blue);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;opacity:.8}
.comment-text{font-size:.8125rem;color:var(--text2)}
.note-owner{margin-top:.5rem;padding:8px 10px;background:var(--amber-bg);border-radius:var(--radius-sm);font-size:.8125rem;color:var(--amber);border-left:2px solid var(--amber-border)}

/* CARINE */
.c-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:7px}
.c-title{font-family:'DM Serif Display',serif;font-size:1.125rem;font-weight:400;letter-spacing:.01em;margin-bottom:3px;line-height:1.35}
.c-sub{font-size:.8125rem;color:var(--text3);margin-bottom:.75rem}
.c-window{font-size:.75rem;color:var(--text2);margin-bottom:1rem;padding:7px 10px;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;gap:6px;border:1px solid var(--border)}
.c-tasks{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:.875rem}
.c-task{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:.8125rem;border-bottom:1px solid var(--border);color:var(--text2)}
.c-task:last-child{border-bottom:none}
.task-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0}
.c-comment-area{width:100%;padding:9px 11px;font-size:.8125rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;resize:vertical;min-height:56px;margin-bottom:.75rem;transition:border-color var(--t)}
.c-comment-area:focus{outline:none;border-color:var(--border2)}
.c-comment-area::placeholder{color:var(--text3)}
.c-btns{display:flex;gap:8px}
.c-btns .btn{flex:1;justify-content:center;padding:9px;font-size:.875rem;font-weight:500}
.ok-tag{display:inline-flex;align-items:center;gap:5px;font-size:.6875rem;padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,9,8,.3);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:500px){.modal-overlay{align-items:center}}
.modal{background:var(--surface);border-radius:14px 14px 0 0;padding:1.75rem 1.5rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:500px){.modal{border-radius:12px}}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.375rem;font-weight:400;letter-spacing:.01em;margin-bottom:.25rem}
.modal-sub{font-size:.8125rem;color:var(--text3);margin-bottom:1.375rem}
.field-group{margin-bottom:1rem}
.field-label{font-size:.6875rem;font-weight:600;color:var(--text3);margin-bottom:.375rem;display:block;text-transform:uppercase;letter-spacing:.05em}
.field-input{width:100%;padding:9px 11px;font-size:.875rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:border-color var(--t)}
.field-input:focus{outline:none;border-color:var(--border2)}
.field-input.error{border-color:var(--red-border);background:var(--red-bg)}
.field-date{font-family:'DM Mono',monospace}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.conflict-warn{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:.875rem;font-size:.8125rem;color:var(--red)}
.conflict-warn strong{display:block;margin-bottom:4px}
.modal-actions{display:flex;gap:8px;margin-top:1.375rem}
.modal-actions .btn{flex:1;justify-content:center;padding:10px;font-weight:500}

/* FAB */
.fab{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:.875rem;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.18);transition:box-shadow var(--t),opacity var(--t);z-index:50;opacity:.92}
.fab:hover{box-shadow:0 4px 18px rgba(0,0,0,.24);opacity:1}

/* SYNC INDICATOR */
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;vertical-align:middle;opacity:.7}
.sync-dot.saving{background:var(--amber);animation:pulse 1.2s infinite}
.sync-dot.error{background:var(--red)}
.card.is-deleted{opacity:.55;background:var(--bg)}
.diff-box{margin-top:1rem;padding:.875rem;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-sm)}
.diff-title{font-size:.5625rem;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.625rem;opacity:.85}
.diff-row{display:flex;align-items:center;gap:8px;font-size:.8125rem;margin-bottom:4px}
.diff-label{flex:1;color:var(--text2)}
.diff-old{color:var(--red);text-decoration:line-through;font-family:'DM Mono',monospace;font-size:.75rem}
.diff-arrow{color:var(--text3)}
.diff-new{color:var(--green);font-family:'DM Mono',monospace;font-size:.75rem;font-weight:600}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<div id="modal-root"></div>
<script>
// ═══════════════════════════════════════════════════════
// ⚙️  CONFIGURATION — À remplir avec vos clés Supabase
//     (voir guide d'installation)
// ═══════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://crubkjxhwkuugmcvxzbz.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNydWJranhod2t1dWdtY3Z4emJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjYwNTAsImV4cCI6MjA5MjU0MjA1MH0.CEUoX5Z2qb_9oRCnvfAEIOZfy3E-eknKzc_dRiXXUoo';

const FIXED    = ['Salon','Chambre rez-de-chaussée','Cuisine','Salle de bain(s)','WC'];
const DEFS     = {draps_retrait:true,draps_pose:true,etage:'complet',escalier:false,sas:false};
const OWNER_PWD = 'gite2025';

// ── état ──
let user=null, icalRes=[], adhocRes=[];
let assign={}, tasks={}, onotes={}, ccomments={}, panels={}, dateOverrides={}, hidden=new Set(), deleted=new Set(), snapshots={};
let icalUrl='';
let icDone=false, icMode='loading';
let syncState='ok'; // ok | saving | error

// ── Supabase helpers ──
async function sbGet(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/menage_state?id=eq.singleton&select=data`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!r.ok)throw new Error('GET failed');
  const rows=await r.json();
  return rows[0]?.data||null;
}

async function sbSet(data){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/menage_state`,{
    method:'POST',
    headers:{
      'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'
    },
    body:JSON.stringify({id:'singleton',data,updated_at:new Date().toISOString()})
  });
  if(!r.ok)throw new Error('UPSERT failed');
}

// ── sérialisation ──
function serialize(){
  return{
    _savedAt:new Date().toISOString(),
    assign,tasks,onotes,ccomments,icalUrl,snapshots,hidden:[...hidden],deleted:[...deleted],
    adhoc:adhocRes.map(r=>({...r,
      start:r.start.toISOString(),end:r.end.toISOString(),checkout:r.checkout.toISOString()
    })),
    overrides:Object.fromEntries(Object.entries(dateOverrides).map(([id,v])=>[id,{
      checkout:v.checkout?v.checkout.toISOString():null,
      nextCheckin:v.nextCheckin!==undefined?(v.nextCheckin?v.nextCheckin.toISOString():null):undefined,
      checkoutTime:v.checkoutTime||null,
      nextCheckinTime:v.nextCheckinTime||null
    }]))
  };
}

function deserialize(s){
  if(!s)return;
  assign    = s.assign||{};
  tasks     = s.tasks||{};
  onotes    = s.onotes||{};
  ccomments = s.ccomments||{};
  icalUrl   = s.icalUrl||'';
  hidden    = new Set(s.hidden||[]);
  deleted   = new Set(s.deleted||[]);
  snapshots = s.snapshots||{};
  adhocRes  = (s.adhoc||[]).map(r=>({...r,
    start:new Date(r.start),end:new Date(r.end),checkout:new Date(r.checkout)
  }));
  if(s.overrides){
    for(const[id,v]of Object.entries(s.overrides)){
      dateOverrides[id]={
        checkout:v.checkout?new Date(v.checkout):null,
        nextCheckin:v.nextCheckin!==undefined?(v.nextCheckin?new Date(v.nextCheckin):null):undefined,
        checkoutTime:v.checkoutTime||null,
        nextCheckinTime:v.nextCheckinTime||null
      };
    }
  }
}

// ── save/load avec indicateur visuel ──
let saveTimer=null;
async function save(){
  clearTimeout(saveTimer);
  syncState='saving'; updateSyncDot();
  // Écriture localStorage immédiate — pas de debounce, survit à un rechargement rapide
  try{localStorage.setItem('menage_fallback',JSON.stringify(serialize()));}catch(_){}
  // Supabase en debounce 800ms pour éviter les rafales
  saveTimer=setTimeout(async()=>{
    try{
      await sbSet(serialize());
      syncState='ok';
    }catch(e){
      syncState='error';
      console.error('Supabase save error',e);
    }
    updateSyncDot();
  },800);
}

function hasContent(d){
  if(!d)return false;
  return !!(d.icalUrl||(d.adhoc&&d.adhoc.length>0)||(d.assign&&Object.keys(d.assign).length>0));
}

async function load(){
  let sbData=null, sbOk=false;
  try{sbData=await sbGet(); sbOk=true;}catch(e){console.error('Supabase load error',e);}

  let localData=null;
  try{const raw=localStorage.getItem('menage_fallback');if(raw)localData=JSON.parse(raw);}catch(_){}

  if(sbOk){
    const sbHas=hasContent(sbData), locHas=hasContent(localData);
    const sbTs=sbData?._savedAt?new Date(sbData._savedAt):new Date(0);
    const locTs=localData?._savedAt?new Date(localData._savedAt):new Date(0);
    // localStorage gagne seulement s'il a des données réelles ET est plus récent
    if(locHas&&locTs>sbTs){
      deserialize(localData);
      if(sbOk)try{await sbSet(localData);}catch(_){}
    }else if(sbHas){
      deserialize(sbData);
      try{localStorage.setItem('menage_fallback',JSON.stringify(sbData));}catch(_){}
    }else if(locHas){
      // Supabase vide mais localStorage a des données → récupération
      deserialize(localData);
      try{await sbSet(localData);}catch(_){}
    }
    return;
  }

  // Supabase indisponible : localStorage en secours
  if(localData)deserialize(localData);
}

function updateSyncDot(){
  const dot=document.getElementById('sync-dot');
  if(!dot)return;
  dot.className='sync-dot'+(syncState==='saving'?' saving':syncState==='error'?' error':'');
  dot.title=syncState==='ok'?'Synchronisé':syncState==='saving'?'Enregistrement…':'Erreur de synchro';
}

// ── iCal ──
function parseICS(t){
  const ev=[];
  t.split('BEGIN:VEVENT').slice(1).forEach(b=>{
    const sum=(b.match(/SUMMARY:(.+)/)||[])[1]?.trim()||'';
    if(sum.toLowerCase().includes('not available')||sum.toLowerCase()==='airbnb'||!sum)return;
    const ds=(b.match(/DTSTART;VALUE=DATE:(\d+)/)||b.match(/DTSTART:(\d{8})/)||[])[1];
    const de=(b.match(/DTEND;VALUE=DATE:(\d+)/)||b.match(/DTEND:(\d{8})/)||[])[1];
    if(!ds||!de)return;
    const s=pd(ds),e=pd(de),n=Math.round((e-s)/86400000);
    if(n>0&&e>=new Date())ev.push({id:'r'+ds,start:s,end:e,nights:n,checkout:e,source:'airbnb'});
  });
  return ev.sort((a,b)=>a.start-b.start);
}
function pd(s){return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));}

// ── formatting ──
function allRes(){return[...icalRes,...adhocRes].filter(r=>!hidden.has(r.id)&&!deleted.has(r.id)).sort((a,b)=>a.checkout-b.checkout);}
function deletedRes(){return[...icalRes,...adhocRes].filter(r=>deleted.has(r.id)).sort((a,b)=>a.checkout-b.checkout);}
function fmtMed(d){return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function fmtShort(d){return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}
function fmtInput(d){return d.toISOString().slice(0,10);}

function getEffective(r){
  const ov=dateOverrides[r.id]||{};
  const checkout=ov.checkout||r.checkout;
  let nextCheckin;
  if(ov.nextCheckin!==undefined){nextCheckin=ov.nextCheckin;}
  else{const all=allRes(),idx=all.findIndex(x=>x.id===r.id),next=all[idx+1];nextCheckin=next?next.start:null;}
  return{checkout,nextCheckin};
}

function getCoTime(id){return(dateOverrides[id]?.checkoutTime)||'11:00';}
function getCiTime(id){return(dateOverrides[id]?.nextCheckinTime)||'16:00';}

function getMissionTitle(r){
  const{checkout,nextCheckin}=getEffective(r);
  if(nextCheckin)return`Ménage entre le ${fmtMed(checkout)} → ${fmtMed(nextCheckin)}`;
  return`Ménage à partir du ${fmtMed(checkout)}`;
}
function getWindowStr(r){
  const{checkout,nextCheckin}=getEffective(r);
  const from=`${fmtMed(checkout)} à ${getCoTime(r.id)}`;
  if(nextCheckin)return`${from} → ${fmtMed(nextCheckin)} à ${getCiTime(r.id)}`;
  return`À partir du ${from}`;
}

// ── tasks ──
function initTask(id){if(!tasks[id])tasks[id]={...DEFS};}
function getLines(id){
  const s=tasks[id]||DEFS,l=[...FIXED];
  if(s.draps_retrait&&s.draps_pose)l.push('Remplacement complet des draps');
  else if(s.draps_retrait)l.push('Retrait des draps sales');
  else if(s.draps_pose)l.push('Pose des draps propres');
  if(s.etage==='complet')l.push('Étage : nettoyage complet (aspirateur + serpillère)');
  else if(s.etage==='aspir')l.push('Étage : aspirateur uniquement');
  if(s.escalier)l.push('Escalier');
  if(s.sas)l.push("Sas d'entrée");
  return l;
}
function buildSMS(r){
  const{checkout}=getEffective(r);
  const lines=getLines(r.id).map(l=>'  • '+l).join('\n');
  const note=onotes[r.id]?'\n\nNote : '+onotes[r.id]:'';
  const ctx=r.nights?`suite à un séjour de ${r.nights} nuit${r.nights>1?'s':''}`:'prévu';
  const window=getWindowStr(r);
  return`Bonjour Carine,\n\nSeriez-vous disponible le ${fmtShort(checkout)} pour un ménage ${ctx} ?\nFenêtre d'intervention : ${window}\n\nPrestations :\n${lines}${note}\n\nMerci de confirmer votre disponibilité.`;
}

// ── conflicts ──
function detectConflicts(coDate,ciDate,excludeId=null){
  const hits=new Set();
  allRes().filter(r=>r.id!==excludeId).forEach(r=>{
    if(coDate>=r.start&&coDate<r.end)hits.add(r);
    if(ciDate&&ciDate>r.start&&ciDate<=r.end)hits.add(r);
  });
  return[...hits];
}

async function doCarine(id){assign[id]={who:'carine',status:'pending'};panels[id]=true;await save();render();}

async function deleteMission(id){

    adhocRes=adhocRes.filter(r=>r.id!==id);

function copySms(id){
  const r=allRes().find(x=>x.id===id),text=buildSMS(r);

  });

// ── diff ──
const TASK_LABELS={draps_retrait:'Retrait des draps sales',draps_pose:'Pose des draps propres',etage:'Étage',escalier:'Escalier',sas:"Sas d'entrée"};
function isModified(id,r){
  const snap=snapshots[id];if(!snap)return false;
  const cur=tasks[id]||{...DEFS},st=snap.tasks||{...DEFS};
  if(['draps_retrait','draps_pose','escalier','sas'].some(k=>cur[k]!==st[k]))return true;
  if(cur.etage!==st.etage)return true;
  const{checkout,nextCheckin}=getEffective(r);
  if(snap.checkout&&checkout.toISOString().slice(0,10)!==snap.checkout.slice(0,10))return true;
  const nc=nextCheckin?nextCheckin.toISOString().slice(0,10):null;
  if(nc!==(snap.nextCheckin?snap.nextCheckin.slice(0,10):null))return true;
  if(getCoTime(id)!==(snap.checkoutTime||'11:00'))return true;
  if(getCiTime(id)!==(snap.nextCheckinTime||'16:00'))return true;
  return false;
}
function buildDiff(id,r){
  const snap=snapshots[id];if(!snap)return'';
  const cur=tasks[id]||{...DEFS},st=snap.tasks||{...DEFS};
  const lines=[];
  ['draps_retrait','draps_pose','escalier','sas'].forEach(k=>{
    if(cur[k]!==st[k])lines.push(`<div class="diff-row"><span class="diff-label">${TASK_LABELS[k]}</span><span class="diff-old">${st[k]?'✓':'✗'}</span><span class="diff-arrow">→</span><span class="diff-new">${cur[k]?'✓':'✗'}</span></div>`);
  });
  if(cur.etage!==st.etage)lines.push(`<div class="diff-row"><span class="diff-label">Étage</span><span class="diff-old">${st.etage}</span><span class="diff-arrow">→</span><span class="diff-new">${cur.etage}</span></div>`);
  const{checkout,nextCheckin}=getEffective(r);
  if(snap.checkout&&checkout.toISOString().slice(0,10)!==snap.checkout.slice(0,10))
    lines.push(`<div class="diff-row"><span class="diff-label">Check-out</span><span class="diff-old">${fmtMed(new Date(snap.checkout))}</span><span class="diff-arrow">→</span><span class="diff-new">${fmtMed(checkout)}</span></div>`);
  const sCoT=snap.checkoutTime||'11:00',curCoT=getCoTime(id);
  if(curCoT!==sCoT)lines.push(`<div class="diff-row"><span class="diff-label">Heure check-out</span><span class="diff-old">${sCoT}</span><span class="diff-arrow">→</span><span class="diff-new">${curCoT}</span></div>`);
  const nc=nextCheckin?nextCheckin.toISOString().slice(0,10):null,snc=snap.nextCheckin?snap.nextCheckin.slice(0,10):null;
  if(nc!==snc)
    lines.push(`<div class="diff-row"><span class="diff-label">Check-in suivant</span><span class="diff-old">${snc?fmtMed(new Date(snap.nextCheckin)):'—'}</span><span class="diff-arrow">→</span><span class="diff-new">${nextCheckin?fmtMed(nextCheckin):'—'}</span></div>`);
  const sCiT=snap.nextCheckinTime||'16:00',curCiT=getCiTime(id);
  if(curCiT!==sCiT)lines.push(`<div class="diff-row"><span class="diff-label">Heure check-in</span><span class="diff-old">${sCiT}</span><span class="diff-arrow">→</span><span class="diff-new">${curCiT}</span></div>`);
  if(!lines.length)return'';
  return`<div class="diff-box"><div class="diff-title">Modifications depuis la confirmation de Carine</div>${lines.join('')}</div>`;
}

function getBadge(id,r){

  if(!a)return '<span class="badge b-none">À assigner</span>';

  return '';

    <div class="c-tasks">${lines.map(l=>`<div class="c-task"><span class="task-dot"></span>${l}</div>`).join('')}</div>
    ${note?`<div class="note-owner">📝 Note du propriétaire : ${note}</div>`:''}
    ${showActions?`
      <div style="font-size:.75rem;color:var(--text3);margin:.875rem 0 .375rem;font-weight:500">Votre commentaire (optionnel)</div>
      <textarea class="c-comment-area" id="cc_${r.id}" placeholder="Disponible à partir de 10h…">${cc||''}</textarea>
      <div class="c-btns"><button class="btn btn-green" onclick="carineReply('${r.id}',true)">✓ Disponible</button><button class="btn btn-red" onclick="carineReply('${r.id}',false)">✗ Pas disponible</button></div>
    `:`<div style="margin-top:.625rem"><span class="ok-tag">✓ Mission acceptée</span></div>${cc?`<div class="comment-box" style="margin-top:.75rem"><div class="comment-author">Votre commentaire</div><div class="comment-text">${cc}</div></div>`:''}`}
  </div>`;
}

// ── modal ──
function openModal(){
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="handleOverlay(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Nouvelle mission ad-hoc</div>
      <div class="modal-sub">Réservation hors Airbnb ou ménage ponctuel</div>
      <div class="field-group"><label class="field-label">Plateforme / description</label><input type="text" class="field-input" id="m-plat" placeholder="Booking.com, famille, ménage de saison…"></div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Date de check-out *</label><input type="date" class="field-input field-date" id="m-co" oninput="modalCheckConflicts()"></div>
        <div class="field-group"><label class="field-label">Check-in suivant</label><input type="date" class="field-input field-date" id="m-ci" oninput="modalCheckConflicts()"></div>
      </div>
      <div class="field-group"><label class="field-label">Durée du séjour (nuits)</label><input type="number" class="field-input" id="m-nights" min="1" placeholder="ex : 2"></div>
      <div id="m-conf"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn btn-purple" onclick="submitModal()">＋ Créer</button>
      </div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function handleOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}
function modalCheckConflicts(){
  const coV=document.getElementById('m-co')?.value,ciV=document.getElementById('m-ci')?.value,box=document.getElementById('m-conf');
  if(!coV){box.innerHTML='';return;}
  const hits=detectConflicts(new Date(coV),ciV?new Date(ciV):null);
  box.innerHTML=hits.length?`<div class="conflict-warn"><strong>⚠ Conflit avec ${hits.length} séjour${hits.length>1?'s':''} existant${hits.length>1?'s':''}</strong>${hits.map(h=>`<div>• ${getMissionTitle(h)}</div>`).join('')}<div style="margin-top:5px;opacity:.75;font-size:.75rem">Vous pouvez quand même créer la mission.</div></div>`:'';
}
async function submitModal(){
  const coV=document.getElementById('m-co')?.value;
  if(!coV){document.getElementById('m-co').classList.add('error');return;}
  const co=new Date(coV),ciV=document.getElementById('m-ci')?.value,ci=ciV?new Date(ciV):null;
  const nights=parseInt(document.getElementById('m-nights')?.value)||null;
  const plat=document.getElementById('m-plat')?.value.trim()||'Mission ponctuelle';
  const id='ah_'+Date.now();
  const startD=new Date(co);if(nights)startD.setDate(startD.getDate()-nights);
  adhocRes.push({id,start:startD,end:co,nights,checkout:co,source:'adhoc',platform:plat});
  if(ci)dateOverrides[id]={checkout:co,nextCheckin:ci};
  await save();closeModal();render();
}

// ── screens ──
function renderLogin(){
  return`<div class="login-screen">
    <div class="login-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="login-title">Planning ménage</div>
    <div class="login-sub">Choisissez votre espace</div>
    <div class="profile-grid">
      <div class="profile-card" onclick="setUser('owner')"><div class="p-avatar av-o">P</div><div class="p-name">Propriétaire</div><div class="p-role">Gestion & assignation</div></div>
      <div class="profile-card" onclick="setUser('carine')"><div class="p-avatar av-c">C</div><div class="p-name">Carine</div><div class="p-role">Mes missions</div></div>
    </div>
  </div>`;
}
function renderPwdScreen(){
  document.getElementById('app').innerHTML=`<div class="pwd-screen">
    <div class="pwd-back" onclick="render()">← Retour</div>
    <div class="pwd-card">
      <div class="pwd-title">Espace propriétaire</div>
      <div class="pwd-sub">Saisissez votre mot de passe</div>
      <input class="pwd-input" id="pwd-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
      <button class="pwd-btn" onclick="checkPwd()">Accéder</button>
      <div class="pwd-err" id="pwd-err">Mot de passe incorrect</div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('pwd-input')?.focus(),50);
}
function checkPwd(){
  if(document.getElementById('pwd-input').value===OWNER_PWD){user='owner';sessionStorage.setItem('mu',user);render();}
  else{document.getElementById('pwd-err').classList.add('show');document.getElementById('pwd-input').value='';}
}
function setUser(u){if(u==='owner'){renderPwdScreen();return;}user=u;sessionStorage.setItem('mu',user);render();}
function logout(){user=null;sessionStorage.removeItem('mu');render();}

function renderOwner(){
  const all=allRes(),none=all.filter(r=>!assign[r.id]),mine=all.filter(r=>assign[r.id]?.who==='me'),car=all.filter(r=>assign[r.id]?.who==='carine');
  const pend=car.filter(r=>assign[r.id].status==='pending').length,conf=car.filter(r=>assign[r.id].status==='confirmed').length,decl=car.filter(r=>assign[r.id].status==='declined').length;
  const alert=decl>0?`<div class="alert-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="alert-banner-text">${decl} mission${decl>1?'s':''} refusée${decl>1?'s':''} par Carine — action requise</div></div>`:'';
  const icL=icMode==='demo'?'<span class="ical-status ical-demo">Mode démo</span>':icMode==='live'?`<span class="ical-status ical-ok">${icalRes.length} rés. Airbnb</span>`:'<span class="ical-status ical-loading">Chargement…</span>';
  const icalSetup=`<div class="date-section" style="margin-bottom:1.25rem">
    <div class="tg-label" style="margin-bottom:.5rem">Lien iCal Airbnb</div>
    <div style="font-size:.8125rem;color:var(--text2);margin-bottom:.625rem">Copiez l'URL depuis Airbnb → Calendrier → Connecter des calendriers → Exporter le calendrier.</div>
    <input type="url" class="field-input" id="ical-input" value="${icalUrl}" placeholder="https://www.airbnb.fr/calendar/ical/….ics?t=…" style="font-size:.8125rem;font-family:'DM Mono',monospace">
    <div style="margin-top:.625rem"><button class="btn btn-blue" onclick="saveIcalUrl()">Enregistrer</button></div>
  </div>`;
  return`
    <div class="ical-bar"><span class="ical-dot ${icMode==='live'?'ical-dot-ok':'ical-dot-wait'}"></span><span class="ical-lbl">iCal · ${(!icalUrl||icMode==='demo')?'non configuré':(()=>{try{return new URL(icalUrl).pathname.split('/').pop();}catch{return 'non configuré';}})()}</span>${icL}<span id="sync-dot" class="sync-dot" title="Synchronisé"></span></div>
    ${icalSetup}
    ${alert}
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Non assignés</div><div class="stat-value${none.length?' alert':''}">${none.length}</div></div>
      <div class="stat"><div class="stat-label">Mes missions</div><div class="stat-value">${mine.length}</div></div>
      <div class="stat"><div class="stat-label">Carine — attente</div><div class="stat-value">${pend}</div></div>
      <div class="stat"><div class="stat-label">Carine — confirmés</div><div class="stat-value">${conf}</div></div>
    </div>
    ${none.length?`<div class="sec-div">À assigner <span class="sec-count">${none.length}</span></div>${none.map(r=>ownerCard(r)).join('')}`:''}
    <div class="sec-div">Mes missions <span class="sec-count">${mine.length}</span></div>
    ${mine.length?mine.map(r=>ownerCard(r,{canSendCarine:true})).join(''):'<div class="empty">Aucune mission assignée</div>'}
    <div class="sec-div">Chez Carine <span class="sec-count">${car.length}</span></div>
    ${car.length?car.map(r=>ownerCard(r,{canUnassign:true})).join(''):'<div class="empty">Aucune mission confiée à Carine</div>'}
    ${deletedRes().length?`<div class="sec-div">Supprimées <span class="sec-count">${deletedRes().length}</span></div>${deletedRes().map(r=>deletedCard(r)).join('')}`:''}
    <button class="fab" onclick="openModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Mission ad-hoc</button>
  `;
}

function renderCarine(){
  const all=allRes(),pend=all.filter(r=>assign[r.id]?.who==='carine'&&assign[r.id].status==='pending'),conf=all.filter(r=>assign[r.id]?.who==='carine'&&assign[r.id].status==='confirmed');
  return`
    ${pend.length?`<div class="sec-div">Demandes en attente <span class="sec-count">${pend.length}</span></div>${pend.map(r=>carineCard(r,true)).join('')}`:'<div class="empty" style="padding:1rem 0">Aucune demande en attente.</div>'}
    <div class="sec-div">Missions confirmées <span class="sec-count">${conf.length}</span></div>
    ${conf.length?conf.map(r=>carineCard(r,false)).join(''):'<div class="empty">Aucune mission confirmée</div>'}
  `;
}

function render(){
  const app=document.getElementById('app');
  if(!user){app.innerHTML=renderLogin();return;}
  const tb=`<div class="topbar"><div class="topbar-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="topbar-title">${user==='owner'?'Propriétaire':'Bonjour Carine'}</div><button class="switch-btn" onclick="logout()">Changer de profil</button></div>`;
  app.innerHTML=tb+(user==='owner'?renderOwner():renderCarine());
}

async function saveIcalUrl(){
  const val=document.getElementById('ical-input')?.value.trim();
  if(!val||!val.startsWith('http'))return;
  icalUrl=val;
  await save();
  await loadIcal();
}

async function loadIcal(){
  if(!icalUrl){icMode='demo';icDone=true;render();return;}
  icMode='loading';
  try{
    const r=await fetch('https://corsproxy.io/?url='+encodeURIComponent(icalUrl));
    if(!r.ok)throw 0;
    const t=await r.text();
    if(!t.includes('BEGIN:VCALENDAR'))throw 0;
    icalRes=parseICS(t);icMode='live';
  }catch{
    const d=n=>{const dt=new Date();dt.setDate(dt.getDate()+n);dt.setHours(0,0,0,0);return dt;};
    icalRes=[
      {id:'d1',start:d(3),end:d(7),nights:4,checkout:d(7),source:'airbnb'},
      {id:'d2',start:d(12),end:d(15),nights:3,checkout:d(15),source:'airbnb'},
      {id:'d3',start:d(22),end:d(26),nights:4,checkout:d(26),source:'airbnb'},
    ];
    icMode='demo';
  }
  icDone=true;render();
}

(async()=>{
  user=sessionStorage.getItem('mu')||null;
  render();
  await load();
  render();
  await loadIcal();
})();
</script>
</body>
</html>
